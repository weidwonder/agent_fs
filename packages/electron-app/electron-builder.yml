appId: com.agent-fs.app
productName: Agent FS
directories:
  buildResources: resources
  output: dist
files:
  - out/**
asarUnpack:
  - node_modules/**/@agent-fs/plugin-docx/dotnet/**
  - node_modules/**/@agent-fs/plugin-excel/dist/dotnet/**
extraResources:
  - from: ../plugins/plugin-docx/dotnet/DocxConverter/bin/Release/net8.0/publish
    to: converters/docx
  - from: ../plugins/plugin-excel/dist/dotnet
    to: converters/excel
mac:
  target: dmg
  category: public.app-category.productivity
  icon: resources/icon.icns
win:
  target: nsis
  icon: resources/icon.ico
linux:
  target: AppImage
  icon: resources/icon.png
